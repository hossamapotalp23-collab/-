name: Gradle CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4
        with:
          # Allow our specific workspace Gradle Wrapper jar checksum
          allow-checksums: b3a875ddc1f044746e1b1a55f645584505f4a10438c1afea9f15e92a7c42ec13

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Disable automatic setup-gradle validation to rely on the dedicated validation step above
          validate-wrappers: false

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
